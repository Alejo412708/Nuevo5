<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario HTML</title>
</head>
<body>

<!-- 2. Desarrollo -->

<!-- Estructura básica -->
<h3>Estructura básica</h3>
<form>
    <label>Nombre:</label>
    <input type="text">
    <button type="submit">Enviar</button>
</form>

<br>

<!-- Tipos de entrada -->
<h3>Tipos de entrada</h3>

<label>Texto:</label>
<input type="text"><br><br>

<label>Email:</label>
<input type="email"><br><br>

<label>Contraseña:</label>
<input type="password"><br><br>

<label>Número:</label>
<input type="number"><br><br>

<label>Fecha:</label>
<input type="date"><br><br>

<!-- Validaciones -->
<h3>Validaciones</h3>

<label>Texto obligatorio:</label>
<input type="text" required><br><br>

<label>Edad (1 a 100):</label>
<input type="number" min="1" max="100"><br><br>

<label>Email obligatorio:</label>
<input type="email" required><br><br>

<!-- 3. Actividad práctica -->

<h2>Formulario final</h2>

<form>

    <label>Nombre:</label>
    <input type="text" required><br><br>

    <label>Correo:</label>
    <input type="email" required><br><br>

    <label>Contraseña:</label>
    <input type="password" required><br><br>

    <label>Edad:</label>
    <input type="number" min="1" max="100" required><br><br>

    <button type="submit">Enviar</button>

</form>

</body>
</html>
