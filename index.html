<!DOCTYPE html>

    <title>Formulario</title>
</head>
<body>

<!-- 2. Desarrollo -->

<!-- Estructura básica -->
<form>
    <label>Nombre:</label>
    <input type="text">
    <button type="submit">Enviar</button>
</form>

<br><br>

<!-- Tipos de entrada -->
<input type="text">
<input type="email">
<input type="password">
<input type="number">
<input type="date">

<!-- Validaciones -->
<input type="text" required>
<input type="number" min="1" max="100">
<input type="email" required>

<br><br>

<!-- 3. Actividad práctica -->

<form>

    <label>Nombre:</label>
    <input type="text" required><br><br>

    <button type="submit">Enviar</button>

</form>
