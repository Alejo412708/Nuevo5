<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
</head>
<body>

    <!-- 2. Desarrollo -->

    <h3>Estructura básica</h3>
    <form>
        <label>Nombre:</label>
        <input type="text">
        <button type="submit">Enviar</button>
    </form>

    <h3>Tipos de entrada</h3>
    <input type="text">
    <input type="email">
    <input type="password">
    <input type="number">
    <input type="date">

    <h3>Validaciones</h3>
    <input type="text" required>
    <input type="number" min="1" max="100">
    <input type="email" required>

    <!-- 3. Actividad práctica -->

    <h2>Formulario final</h2>
    <form>

        <label>Nombre:</label>
        <input type="text" required><br><br>

        <label>Correo:</label>
        <input type="email" required><br><br>

        <label>Contraseña:</label>
        <input type="password" required><br><br>

        <label>Edad:</label>
        <input type="number" min="1" max="100" required><br><br>

        <button type="submit">Enviar</button>

    </form>

</body>
</html>
